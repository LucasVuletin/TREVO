<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TREVO Logo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" 
    rel="stylesheet"
  >

  <style>
    :root {
      --trevo-dark: #061926;
      --trevo-green-light: #08c79f;
      --trevo-green-dark: #009b80;
      --background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--background);
      font-family: "Montserrat", Arial, sans-serif;
    }

    .logo-wrapper {
      width: min(94vw, 1200px);
      padding: 48px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .trevo-logo {
      width: 100%;
      height: auto;
      display: block;
    }

    .main-letter {
      font-family: "Montserrat", Arial, sans-serif;
      font-weight: 900;
      font-size: 215px;
      letter-spacing: 8px;
      fill: var(--trevo-dark);
      filter: url(#softShadow);
    }

    .e-bar {
      fill: url(#greenGradient);
      filter: url(#softShadow);
    }

    .tagline {
      font-family: "Montserrat", Arial, sans-serif;
      font-size: 25px;
      font-weight: 100;
      letter-spacing: 13.6px;
      fill: var(--trevo-dark);
    }

    @media (max-width: 768px) {
      .logo-wrapper {
        width: 98vw;
        padding: 32px 12px;
      }
    }
  </style>
</head>

<body>
  <main class="logo-wrapper">
    <svg
      class="trevo-logo"
      viewBox="0 0 1200 420"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="TREVO - Soluciones digitales para empresas"
      role="img"
    >
      <defs>
        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#08c79f" />
          <stop offset="100%" stop-color="#009b80" />
        </linearGradient>

        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow
            dx="0"
            dy="4"
            stdDeviation="2.5"
            flood-color="#000000"
            flood-opacity="0.18"
          />
        </filter>
      </defs>

      <!-- T -->
      <text
        x="85"
        y="245"
        class="main-letter"
      >
        T
      </text>

      <!-- R -->
      <text
        x="300"
        y="245"
        class="main-letter"
      >
        R
      </text>

      <!-- E construida con tres barras verdes -->
      <rect
        class="e-bar"
        x="510"
        y="95"
        width="130"
        height="28"
        rx="8"
      />

      <rect
        class="e-bar"
        x="510"
        y="159"
        width="130"
        height="28"
        rx="8"
      />

      <rect
        class="e-bar"
        x="510"
        y="220"
        width="130"
        height="28"
        rx="8"
      />

      <!-- V -->
      <text
        x="695"
        y="245"
        class="main-letter"
      >
        V
      </text>

      <!-- O -->
      <text
        x="905"
        y="245"
        class="main-letter"
      >
        O
      </text>

      <!-- Eslogan -->
      <text
        x="85"
        y="300"
        class="tagline"
      >
        SOLUCIONES DIGITALES PARA EMPRESAS
      </text>
    </svg>
  </main>
</body>
</html>
